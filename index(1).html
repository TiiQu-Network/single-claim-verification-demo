<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VaaS – Audit Verification Demo</title>

<style>
body {
  margin: 0;
  font-family: system-ui, -apple-system, Segoe UI, Arial, sans-serif;
  background: #f6f9fb;
  color: #0f172a;
}

.container {
  max-width: 1120px;
  margin: auto;
  padding: 48px 24px 96px;
}

.hero {
  text-align: center;
  margin-top: 40px;
}

.hero h1 {
  font-size: 64px;
  margin: 0;
  letter-spacing: -0.04em;
}

.hero p {
  margin-top: 14px;
  font-size: 22px;
  color: #475569;
}

.search-box {
  margin: 56px auto 0;
  max-width: 900px;
  background: white;
  border-radius: 24px;
  border: 1px solid #cbd5e1;
  box-shadow: 0 20px 50px rgba(15,23,42,.08);
  padding: 18px;
  display: flex;
  gap: 16px;
}

textarea {
  flex: 1;
  border: none;
  font-size: 20px;
  padding: 14px;
  resize: none;
  outline: none;
}

button {
  background: #034459;
  color: white;
  border: none;
  border-radius: 16px;
  padding: 18px 28px;
  font-weight: 800;
  cursor: pointer;
}

button:hover { opacity: .9; }

.examples {
  margin-top: 20px;
  display: flex;
  gap: 12px;
  justify-content: center;
  flex-wrap: wrap;
}

.examples button {
  background: white;
  color: #034459;
  border: 1px solid #cbd5e1;
  padding: 10px 16px;
  font-size: 14px;
}

.result {
  margin-top: 64px;
  background: white;
  border-radius: 28px;
  border: 1px solid #e2e8f0;
  padding: 36px;
  display: none;
}

.verdict {
  display: flex;
  gap: 28px;
  align-items: center;
}

.badge {
  width: 112px;
  height: 112px;
  border-radius: 28px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-weight: 900;
  letter-spacing: .08em;
  color: white;
}

.partial { background: #f59e0b; }
.missing { background: #ef4444; }

.verdict-text {
  font-size: 28px;
  font-weight: 900;
}

.metrics {
  margin-top: 28px;
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 18px;
}

.metric {
  background: #f8fafc;
  border-radius: 18px;
  padding: 20px;
  border: 1px solid #e2e8f0;
}

.metric span {
  color: #64748b;
  font-size: 13px;
  font-weight: 700;
}

.metric strong {
  display: block;
  margin-top: 8px;
  font-size: 30px;
}

.section {
  margin-top: 40px;
}

.source {
  margin-top: 14px;
  padding: 16px;
  background: #0f172a;
  color: #e5e7eb;
  border-radius: 14px;
  font-size: 14px;
}

.source a {
  color: #93c5fd;
  text-decoration: none;
}

.improve {
  margin-top: 18px;
  background: #fff7ed;
  border: 1px solid #fed7aa;
  padding: 20px;
  border-radius: 18px;
  color: #7c2d12;
}
</style>
</head>

<body>
<div class="container">

<div class="hero">
  <h1>Is this claim verifiable?</h1>
  <p>Audit‑grade verification of report statements — with clear guidance on missing evidence.</p>
</div>

<div class="search-box">
  <textarea id="claimBox" rows="2"
    placeholder="Paste a statement from an audit or sustainability report…"></textarea>
  <button onclick="verify()">Run audit check</button>
</div>

<div class="examples">
  <button onclick="load(0)">Scope 1 reduction target</button>
  <button onclick="load(1)">Waste hierarchy alignment</button>
  <button onclick="load(2)">Market‑based Scope 2 methodology</button>
</div>

<div id="result" class="result">
  <div class="verdict">
    <div id="badge" class="badge partial">AUDIT</div>
    <div class="verdict-text" id="verdictText"></div>
  </div>

  <div class="metrics">
    <div class="metric"><span>Evidence units</span><strong id="units"></strong></div>
    <div class="metric"><span>Contradiction score</span><strong id="contradiction"></strong></div>
    <div class="metric"><span>Verification state</span><strong id="state"></strong></div>
  </div>

  <div class="section">
    <strong>External verification sources</strong>
    <div id="sources"></div>
  </div>

  <div class="improve">
    <strong>Internal evidence required to complete verification</strong>
    <div id="internal"></div>
  </div>
</div>

</div>

<script>
const claims = [
{
 text:"Scope 1 reduction target of 5% by 2025.",
 verdict:"Externally aligned – internal evidence required",
 units:3,
 contradiction:0,
 sources:[{
  title:"Company‑defined target",
  url:"#",
  quote:"Targets are defined internally by the undertaking."
 }],
 internal:[
  "Sustainability strategy or target statement",
  "Board‑approved ESG targets document",
  "Sustainability report section defining the target"
 ],
 state:"partial"
},
{
 text:"Waste‑management approach is based on the EU Waste Framework Directive hierarchy.",
 verdict:"Externally aligned – internal evidence required",
 units:2,
 contradiction:0,
 sources:[{
  title:"Directive 2008/98/EC – Article 4",
  url:"https://eur-lex.europa.eu/legal-content/EN/TXT/?uri=CELEX:32008L0098",
  quote:"The waste hierarchy shall apply as a priority order in waste prevention and management."
 }],
 internal:[
  "Internal waste‑management policy",
  "Environmental management system procedures",
  "Operational waste‑handling guidelines"
 ],
 state:"partial"
},
{
 text:"Market‑based Scope 2 uses supplier contract emission factors where available.",
 verdict:"Alignment unclear – internal evidence missing",
 units:2,
 contradiction:42,
 sources:[{
  title:"GHG Protocol Scope 2 Guidance",
  url:"https://ghgprotocol.org/scope-2-guidance",
  quote:"Supplier‑specific emission factors may be used where contractual instruments meet the Scope 2 Quality Criteria."
 }],
 internal:[
  "Internal Scope 2 calculation methodology",
  "Supplier emission factor documentation",
  "Disclosure notes explaining methodological choices"
 ],
 state:"missing"
}
];

let current = null;

function load(i){
  current = claims[i];
  document.getElementById("claimBox").value = current.text;
}

function verify(){
  const text = document.getElementById("claimBox").value.trim();
  if(!text) return;

  // fallback: generic audit behaviour
  const c = current || {
    verdict:"Externally aligned – internal evidence required",
    units:1,
    contradiction:0,
    sources:[{
      title:"External requirement or benchmark",
      url:"#",
      quote:"External alignment identified. Internal evidence not provided."
    }],
    internal:["Relevant internal policy, KPI table, or methodology document"],
    state:"partial"
  };

  const badge = document.getElementById("badge");
  badge.className = "badge " + c.state;

  document.getElementById("verdictText").innerText = c.verdict;
  document.getElementById("units").innerText = c.units;
  document.getElementById("contradiction").innerText = c.contradiction + "/100";
  document.getElementById("state").innerText = "Partial verification";

  document.getElementById("sources").innerHTML =
    c.sources.map(s => `
      <div class="source">
        <strong>${s.title}</strong><br>
        <a href="${s.url}"a><br>
        “${s.quote}”
      </div>
    `).join("");

  document.getElementById("internal").innerHTML =
    c.internal.map(i => `• ${i}<br>`).join("");

  document.getElementById("result").style.display = "block";
}
</script>

</body>
</html>
