<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>V.a.a.S – Audit Verification</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
  margin:0;
  font-family: system-ui, -apple-system, Segoe UI, Arial, sans-serif;
  background:#f6f9fb;
  color:#0f172a;
}

.container {
  max-width:1200px;
  margin:auto;
  padding:64px 24px 96px;
}

/* HERO */
.hero {
  text-align:center;
}
.hero h1 {
  font-size:72px;
  font-weight:900;
  letter-spacing:.08em;
  margin:0;
}
.hero p {
  margin-top:14px;
  font-size:24px;
  font-weight:600;
  color:#475569;
}

/* SEARCH */
.search {
  margin:64px auto 0;
  max-width:960px;
  background:white;
  border-radius:28px;
  border:1px solid #cbd5e1;
  box-shadow:0 24px 60px rgba(15,23,42,.1);
  padding:18px;
  display:flex;
  gap:16px;
}
textarea {
  flex:1;
  border:none;
  font-size:20px;
  padding:14px;
  resize:none;
  outline:none;
}
button {
  background:#034459;
  color:white;
  border:none;
  border-radius:18px;
  padding:18px 32px;
  font-weight:800;
  cursor:pointer;
}
button.loading {
  background:#64748b;
}

/* EXAMPLES */
.examples {
  margin-top:22px;
  display:flex;
  gap:12px;
  justify-content:center;
  flex-wrap:wrap;
}
.examples button {
  background:white;
  color:#034459;
  border:1px solid #cbd5e1;
  font-size:14px;
  padding:10px 16px;
}

/* ACTIONS */
.actions {
  margin-top:28px;
  display:flex;
  justify-content:center;
  gap:18px;
  flex-wrap:wrap;
}
.secondary {
  background:white;
  color:#034459;
  border:1px solid #cbd5e1;
}

/* RESULT */
.result {
  margin-top:72px;
  background:white;
  border-radius:32px;
  border:1px solid #e2e8f0;
  padding:40px;
  display:none;
}

/* VERDICT */
.verdict {
  display:flex;
  gap:28px;
  align-items:center;
}
.tree {
  width:120px;
  height:120px;
}
.tree.green { filter: hue-rotate(90deg) saturate(1.4); }
.tree.orange { filter: hue-rotate(30deg) saturate(1.4); }
.tree.red { filter: hue-rotate(-20deg) saturate(1.4); }

.verdict-text {
  font-size:30px;
  font-weight:900;
}

/* METRICS */
.metrics {
  margin-top:32px;
  display:grid;
  grid-template-columns:repeat(2,1fr);
  gap:20px;
}
.metric {
  background:#f8fafc;
  border-radius:18px;
  padding:22px;
  border:1px solid #e2e8f0;
}
.metric span {
  font-size:13px;
  color:#64748b;
  font-weight:700;
}
.metric strong {
  display:block;
  margin-top:8px;
  font-size:32px;
}

/* PROOFS */
.section { margin-top:40px; }
.proof {
  margin-top:16px;
  padding:18px;
  background:#0f172a;
  color:#e5e7eb;
  border-radius:16px;
  font-size:14px;
}
.proof a { color:#93c5fd; text-decoration:none; }

/* IMPROVE */
.improve {
  margin-top:28px;
  background:#fff7ed;
  border:1px solid #fed7aa;
  padding:22px;
  border-radius:20px;
  color:#7c2d12;
}

/* FOOTER CTA */
.footer-cta {
  margin-top:48px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  flex-wrap:wrap;
  gap:20px;
}
</style>
</head>

<body>
<div class="container">

<div class="hero">
  <h1>V.a.a.S</h1>
  <p>
    Is your sustainability report supported by evidence?<br>
    <strong>How audit firms can scale sustainability verification</strong>
  </p>
</div>

<div class="search">
  <textarea id="claimBox" rows="2"
    placeholder="Paste a claim from a sustainability report…"></textarea>
  <button id="auditBtn" onclick="verify()">Audit this claim</button>
</div>

<div class="examples">
  <button onclick="load(0)">Market‑based Scope 2 methodology</button>
  <button onclick="load(1)">Scope 1+2 emissions total</button>
  <button onclick="load(2)">Waste hierarchy compliance</button>
</div>

<div class="actions">
  <button class="secondary" onclick="toggleExplain()">What is deterministic verification?</button>
  <button class="secondary" onclick="window.location.hrefiv id="explain" class="improve" style="display:none;">
Deterministic verification means the same claim is always checked against the same explicit sources and rules,
with traceable evidence and no probabilistic interpretation.
</div>

<div id="result" class="result">
  <div class="verdict">
    <img id="tree" src="tree.svg" class="tree orange" alt="verification status"/>
    <div class="verdict-text" id="verdictText"></div>
  </div>

  <div class="metrics">
    <div class="metric"><span>Units analysed</span><strong id="units"></strong></div>
    <div class="metric"><span>Contradiction score</span><strong id="contradiction"></strong></div>
  </div>

  <div class="section">
    <strong>Verification proofs</strong>
    <div id="proofs"></div>
  </div>

  <div class="improve">
    <strong>How to improve validation</strong><br>
    Add internal evidence such as:
    <div id="internal"></div>
  </div>

  <div class="footer-cta">
    <div>
      <strong>Scale audit by design</strong><br>
      Focus audit effort only on unsupported claims.
    </div>
    <button onclick="window.open('https://outlook.office.com/bookwithme/user/466894027f1f4dfc930519865f644c3a@tiiqunetwork.onmicrosoft.com/meetingtype/vBAwqD3-ZUed0szQcaApaA2','_blank')">
      Discuss a pilot
    </button>
  </div>
</div>

</div>

<script>
const claims = [
{
 text:"Market‑based Scope 2 uses supplier contract emission factors where available under the GHG Protocol hierarchy.",
 verdict:"Fully trusted",
 color:"green",
 units:3,
 contradiction:0,
 proofs:[{
  title:"GHG Protocol Scope 2 Guidance",
  url:"https://ghgprotocol.org/sites/default/files/2023-03/Scope%202%20Guidance.pdf",
  quote:"Supplier‑specific emission factors may be used for market‑based Scope 2 where contractual instruments meet the Scope 2 Quality Criteria (Chapter 6.11.3, pp. 56–57)."
 }],
 internal:["No internal evidence required to validate the rule itself."]
},
{
 text:"Total market‑based Scope 1+2 emissions in 2023 were 366.683.",
 verdict:"Contradicted by internal data",
 color:"red",
 units:2,
 contradiction:100,
 proofs:[{
  title:"Internal sustainability report (same document under review)",
  url:"#",
  quote:"Scope 1: 219.290; Market‑based Scope 2: 140.375. Combined total reported as 366.683."
 }],
 internal:["Reconcile calculation or correct reported total in the report."]
},
{
 text:"Waste‑management approach is based on the EU Waste Framework Directive hierarchy.",
 verdict:"Directionally consistent – internal evidence required",
 color:"orange",
 units:1,
 contradiction:0,
 proofs:[{
  title:"Directive 2008/98/EC – Article 4",
  url:"https://eur-lex.europa.eu/legal-content/EN/TXT/?uri=CELEX:32008L0098",
  quote:"The waste hierarchy shall apply as a priority order in waste prevention and management."
 }],
 internal:["Internal waste‑management policy demonstrating application of the hierarchy."]
}
];

let current=null;

function load(i){
 current=claims[i];
 document.getElementById("claimBox").value=current.text;
}

function verify(){
 if(!current) return;
 const btn=document.getElementById("auditBtn");
 btn.classList.add("loading");
 btn.textContent="Auditing…";

 setTimeout(()=>{
  document.getElementById("result").style.display="block";
  document.getElementById("verdictText").innerText=current.verdict;
  document.getElementById("units").innerText=current.units;
  document.getElementById("contradiction").innerText=current.contradiction+"/100";
  const tree=document.getElementById("tree");
  tree.className="tree "+current.color;

  document.getElementById("proofs").innerHTML=current.proofs.map(p=>`
    <div class="proof">
      <strong>${p.title}</strong><br>
      <a hrefument.getElementById("internal").innerHTML=current.internal.map(i=>"• "+i+"<br>").join("");

  btn.classList.remove("loading");
  btn.textContent="Audit this claim";
 },700);
}

function toggleExplain(){
 const e=document.getElementById("explain");
 e.style.display=e.style.display==="none"?"block":"none";
}
</script>

</body>
</html>
