<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>V.a.a.S – Audit Verification</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
  margin:0;
  font-family:system-ui,Arial;
  background:#f6f9fb;
  color:#0f172a;
}

.container{
  max-width:1100px;
  margin:auto;
  padding:60px 20px;
}

/* HERO */
.hero{text-align:center;}
.hero h1{
  font-size:72px;
  font-weight:900;
  letter-spacing:.08em;
  margin:0;
}
.hero p{
  margin-top:14px;
  font-size:22px;
  font-weight:600;
  color:#475569;
}

/* SEARCH */
.search{
  margin:60px auto;
  max-width:900px;
  background:white;
  border-radius:24px;
  border:1px solid #cbd5e1;
  padding:20px;
  display:flex;
  gap:12px;
}
textarea{
  flex:1;
  border:none;
  font-size:18px;
  outline:none;
}
button{
  background:#034459;
  color:white;
  border:none;
  border-radius:16px;
  padding:16px 24px;
  font-weight:800;
  cursor:pointer;
}
button.loading{
  background:#64748b;
}

/* EXAMPLES */
.examples{
  text-align:center;
  margin-top:10px;
}
.examples button{
  background:white;
  color:#034459;
  border:1px solid #cbd5e1;
  margin:5px;
}

/* RESULT */
.result{
  display:none;
  margin-top:40px;
  background:white;
  border-radius:24px;
  padding:30px;
}

/* VERDICT */
.verdict{
  display:flex;
  gap:20px;
  align-items:center;
}
.tree{
  width:80px;
  height:80px;
  fill:#16a34a;
}
.tree.orange{fill:#f59e0b;}
.tree.red{fill:#ef4444;}

.verdict-text{
  font-size:26px;
  font-weight:800;
}

/* METRICS */
.metrics{
  display:flex;
  gap:20px;
  margin-top:20px;
}
.metric{
  background:#f8fafc;
  padding:14px;
  border-radius:12px;
}

/* PROOFS */
.proof{
  background:#0f172a;
  color:white;
  margin-top:10px;
  padding:14px;
  border-radius:10px;
}
.proof a{
  color:#93c5fd;
  text-decoration:none;
}

/* IMPROVE */
.improve{
  margin-top:20px;
  background:#fff7ed;
  padding:14px;
  border-radius:10px;
}

/* CTA */
.footer{
  margin-top:20px;
}

</style>
</head>

<body>

<div class="container">

<div class="hero">
  <h1>V.a.a.S</h1>
  <p>
    Is your sustainability report supported by evidence?<br>
    How audit firms scale verification
  </p>
</div>

<div class="search">
  <textarea id="claimBox" placeholder="Paste a claim..."></textarea>
  <button id="auditBtn" onclick="verify()">Audit this claim</button>
</div>

<div class="examples">
  <button onclick="load(0)">Scope 2 methodology</button>
  <button onclick="load(1)">Scope 1+2 emissions</button>
  <button onclick="load(2)">Waste hierarchy</button>
</div>

<div id="result" class="result">

<div class="verdict">

<!-- TREE ICON -->
<svg id="tree" class="tree" viewBox="0 0 100 100">
<circle cx="50" cy="20" r="12"/>
<circle cx="35" cy="50" r="12"/>
<circle cx="65" cy="50" r="12"/>
<rect x="45" y="30" width="10" height="50"/>
</svg>

<div id="verdictText" class="verdict-text"></div>
</div>

<div class="metrics">
  <div class="metric"><b>Units:</b> <span id="units"></span></div>
  <div class="metric"><b>Contradiction:</b> <span id="contradiction"></span></div>
</div>

<div id="proofs"></div>

<div class="improve">
<b>How to improve validation:</b>
<div id="internal"></div>
</div>

<div class="footer">
<b>Scale audit:</b> focus only on unsupported claims.<br><br>
<button onclick="window.open('https://outlook.office.com/bookwithme/user/466894027f1f4dfc930519865f644c3a@tiiqunetwork.onmicrosoft.com/meetingtype/vBAwqD3-ZUed0szQcaApaA2','_blank')">
Discuss a pilot
</button>
</div>

</div>

</div>

<script>

const claims = [

{
text:"Market-based Scope 2 uses supplier contract emission factors where available.",
verdict:"Fully trusted",
color:"green",
units:3,
contradiction:0,
proofs:[{
title:"GHG Protocol Scope 2 Guidance",
url:"https://ghgprotocol.org/sites/default/files/2023-03/Scope%202%20Guidance.pdf",
quote:"Supplier-specific emission factors may be used (Chapter 6.11.3)."
}],
internal:["No internal evidence required"]
},

{
text:"Total market-based Scope 1+2 emissions in 2023 were 366.683.",
verdict:"Contradicted by internal data",
color:"red",
units:2,
contradiction:100,
proofs:[{
title:"Internal report (same document)",
url:"#",
quote:"Scope 1: 219.290 + Scope 2: 140.375 = 359.665"
}],
internal:["Fix calculation or reconcile numbers"]
},

{
text:"Waste-management approach follows EU Waste Directive hierarchy.",
verdict:"Directionally consistent",
color:"orange",
units:1,
contradiction:0,
proofs:[{
title:"Directive 2008/98/EC",
url:"https://eur-lex.europa.eu/legal-content/EN/TXT/?uri=CELEX:32008L0098",
quote:"The waste hierarchy shall apply as priority order."
}],
internal:["Internal waste policy showing implementation"]
}

];

let current=null;

function load(i){
current=claims[i];
document.getElementById("claimBox").value=current.text;
}

function verify(){

if(!current){
  current=claims[0]; // ✅ prevents dead click
}

let btn=document.getElementById("auditBtn");
btn.classList.add("loading");
btn.innerText="Auditing...";

setTimeout(()=>{

document.getElementById("result").style.display="block";
document.getElementById("verdictText").innerText=current.verdict;
document.getElementById("units").innerText=current.units;
document.getElementById("contradiction").innerText=current.contradiction+"/100";

let tree=document.getElementById("tree");
tree.classList.remove("orange","red");

if(current.color==="red"){tree.classList.add("red");}
else if(current.color==="orange"){tree.classList.add("orange");}

document.getElementById("proofs").innerHTML=current.proofs.map(p=>`
<div class="proof">
<b>${p.title}</b><br>
<a href="${p.url}"e</a><br>
"${p.quote}"
</div>
`).join("");

document.getElementById("internal").innerHTML=current.internal.map(i=>"• "+i).join("<br>");

btn.classList.remove("loading");
btn.innerText="Audit this claim";

},600);

}

</script>

</body>
</html>
