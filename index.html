<!DOCTYPE html>
<html>
<head>
<title>V.a.a.S</title>

<style>
body{font-family:Arial;background:#f6f9fb;margin:0;}
.container{max-width:900px;margin:auto;padding:50px 20px;}

.hero{text-align:center;}
.hero h1{font-size:70px;font-weight:900;margin:0;}
.hero p{color:#555;font-size:18px;}

.search{
  display:flex;
  gap:10px;
  margin-top:40px;
  background:white;
  padding:15px;
  border-radius:20px;
}
textarea{flex:1;font-size:16px;border:none;outline:none;}

button{
  padding:14px 22px;
  border:none;
  border-radius:16px;
  background:#034459;
  color:white;
  font-weight:700;
  cursor:pointer;
}

.examples{
  text-align:center;
  margin-top:15px;
}
.examples button{
  background:white;
  color:#034459;
  border:1px solid #ddd;
  margin:5px;
}

.result{
  display:none;
  margin-top:40px;
  background:white;
  padding:20px;
  border-radius:20px;
}

.card{
  display:inline-block;
  border:1px solid #ddd;
  padding:10px;
  margin:5px;
  border-radius:10px;
}

.proof{
  margin-top:15px;
  background:#111;
  color:white;
  padding:15px;
  border-radius:10px;
}
.proof a{color:#60a5fa;}

.cta{text-align:center;margin-top:40px;}
.cta button{background:#f59e0b;}
</style>

</head>

<body>

<div class="container">

<div class="hero">
<h1>V.a.a.S</h1>
<p>Audit sustainability claims with verifiable evidence</p>
</div>

<div class="search">
<textarea id="input" placeholder="Paste a claim..."></textarea>
<button onclick="run()">Audit this claim</button>
</div>

<div class="examples">
<button onclick="fill('scope2')">Scope 2</button>
<button onclick="fill('emissions')">Emissions</button>
<button onclick="fill('waste')">Waste</button>
</div>

<div id="result" class="result">

<h2 id="verdict"></h2>

<div class="card">Units: <span id="units"></span></div>
<div class="card">Contradiction: <span id="contr"></span></div>

<div id="proof"></div>

<p><b>Improve validation:</b></p>
<div id="improve"></div>

</div>

<div class="cta">
<button onclick="window.open('https://outlook.office.com/bookwithme/user/466894027f1f4dfc930519865f644c3a@tiiqunetwork.onmicrosoft.com/meetingtype/vBAwqD3-ZUed0szQcaApaA2')">
Discuss a pilot
</button>
</div>

</div>

<script>

/* Examples */
function fill(type){

if(type==="scope2"){
document.getElementById("input").value="Scope 2 emissions methodology";
}

if(type==="emissions"){
document.getElementById("input").value="Total emissions 366.683";
}

if(type==="waste"){
document.getElementById("input").value="Waste hierarchy approach";
}

}

/* MAIN */
function run(){

var text=document.getElementById("input").value.toLowerCase();

var verdict="No matching rule";
var units="1";
var contr="0";
var proof="<div class='proof'>No structured evidence</div>";
var improve="Define verification logic";

/* Scope 2 */
if(text.indexOf("scope")!=-1 && text.indexOf("2")!=-1){

verdict="✅ Fully trusted";
units="3";
contr="0";

proof="<div class='proof'><b>GHG Protocol Scope 2 Guidance</b><br>" +
"<a href='https://ghgprotocol.org/sites/default/files/2023-03/Scope%202%20Guidance.pdf' target='_</a><br><br>" +
"Chapter 6.2 (pp.44–45)<br>" +
"Chapter 6.11.3 (pp.56–57)</div>";

improve="Optional: include internal methodology confirming application";
}

/* Emissions */
else if(text.indexOf("366")!=-1){

verdict="❌ Contradicted";
units="2";
contr="100";

proof="<div class='proof'><b>Internal report</b><br>" +
"ESRS E1-6 – Page 64<br>" +
"219.290 + 140.375 ≠ 366.683</div>";

improve="Fix inconsistency in reported total";
}

/* Waste */
else if(text.indexOf("waste")!=-1){

verdict="⚠️ Partial alignment";
units="1";
contr="0";

proof="<div class='proof'><b>EU Directive 2008/98/EC</b><br>" +
"<a href='https://eur-lex.europa.eu/legal-content/EN/TXT/?uri=CELEX:32008L0098' target='_blankbr><br>" +
"Article 4 – Waste hierarchy</div>";

improve="Provide internal policy demonstrating implementation";
}

/* RENDER */
document.getElementById("result").style.display="block";
document.getElementById("verdict").innerText=verdict;
document.getElementById("units").innerText=units;
document.getElementById("contr").innerText=contr+"/100";
document.getElementById("proof").innerHTML=proof;
document.getElementById("improve").innerText=improve;

}

</script>

</body>
</html>
