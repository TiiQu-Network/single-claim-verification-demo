<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>V.a.a.S – Audit Verification</title>

<style>
body {
  margin: 0;
  font-family: system-ui, -apple-system, Segoe UI, Arial, sans-serif;
  background: #f6f9fb;
  color: #0f172a;
}

.container {
  max-width: 1200px;
  margin: auto;
  padding: 56px 24px 96px;
}

/* HERO */
.hero {
  text-align: center;
}

.hero h1 {
  font-size: 72px;
  margin: 0;
  letter-spacing: .08em;
}

.hero p {
  margin-top: 12px;
  font-size: 22px;
  color: #475569;
}

/* SEARCH */
.search {
  margin: 64px auto 0;
  max-width: 960px;
  background: white;
  border-radius: 28px;
  border: 1px solid #cbd5e1;
  box-shadow: 0 24px 60px rgba(15,23,42,.1);
  padding: 18px;
  display: flex;
  gap: 16px;
}

textarea {
  flex: 1;
  border: none;
  font-size: 20px;
  padding: 14px;
  resize: none;
  outline: none;
}

button {
  background: #034459;
  color: white;
  border: none;
  border-radius: 18px;
  padding: 18px 30px;
  font-weight: 800;
  cursor: pointer;
}

button:hover { opacity: .9; }

/* EXAMPLES */
.examples {
  margin-top: 22px;
  display: flex;
  gap: 12px;
  justify-content: center;
  flex-wrap: wrap;
}

.examples button {
  background: white;
  color: #034459;
  border: 1px solid #cbd5e1;
  font-size: 14px;
  padding: 10px 16px;
}

/* ACTIONS */
.actions {
  margin-top: 28px;
  display: flex;
  justify-content: center;
  gap: 18px;
  flex-wrap: wrap;
}

.secondary {
  background: white;
  color: #034459;
  border: 1px solid #cbd5e1;
}

/* RESULT */
.result {
  margin-top: 72px;
  background: white;
  border-radius: 32px;
  border: 1px solid #e2e8f0;
  padding: 40px;
  display: none;
}

/* VERDICT */
.verdict {
  display: flex;
  gap: 28px;
  align-items: center;
}

.tree {
  width: 120px;
  height: 120px;
  border-radius: 32px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-weight: 900;
  color: white;
  letter-spacing: .08em;
}

.green { background: #16a34a; }
.orange { background: #f59e0b; }
.red { background: #ef4444; }

.verdict-text {
  font-size: 30px;
  font-weight: 900;
}

/* METRICS */
.metrics {
  margin-top: 32px;
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 20px;
}

.metric {
  background: #f8fafc;
  border-radius: 18px;
  padding: 22px;
  border: 1px solid #e2e8f0;
}

.metric span {
  font-size: 13px;
  color: #64748b;
  font-weight: 700;
}

.metric strong {
  display: block;
  margin-top: 8px;
  font-size: 32px;
}

.section {
  margin-top: 40px;
}
