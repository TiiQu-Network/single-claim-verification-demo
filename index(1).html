<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>V.a.a.S – Audit Verification</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
  margin:0;
  font-family:Arial;
  background:#f6f9fb;
}
.container{
  max-width:900px;
  margin:auto;
  padding:40px 20px;
}

/* HERO */
.hero{text-align:center;}
.hero h1{font-size:60px; font-weight:900;}
.hero p{font-size:18px; color:#444}

/* SEARCH */
.search{
  display:flex;
  gap:10px;
  margin-top:30px;
  background:#fff;
  padding:15px;
  border-radius:15px;
}
textarea{
  flex:1;
  border:none;
  font-size:18px;
  outline:none;
}

/* BUTTON */
button{
  padding:12px 20px;
  border:none;
  border-radius:10px;
  background:#034459;
  color:white;
  cursor:pointer;
}

/* EXAMPLES */
.examples{
  text-align:center;
  margin-top:10px;
}
.examples button{
  background:white;
  color:#034459;
  border:1px solid #ccc;
  margin:5px;
}

/* RESULT */
.result{
  display:none;
  background:white;
  margin-top:30px;
  padding:20px;
  border-radius:15px;
}

/* TREE */
.tree{
  width:70px;
  height:70px;
}
.green{fill:#16a34a;}
.orange{fill:#f59e0b;}
.red{fill:#ef4444;}

.metrics{
  display:flex;
  gap:10px;
  margin-top:10px;
}
.card{
  background:#f8fafc;
  padding:10px;
  border-radius:8px;
  border:1px solid #ddd;
}

/* PROOF */
.proof{
  background:#111;
  color:white;
  padding:12px;
  border-radius:10px;
  margin-top:10px;
}
.proof a{color:#60a5fa}

/* CTA */
.cta{
  text-align:center;
  margin-top:40px;
}
.cta button{
  background:#f59e0b;
}
</style>
</head>

<body>

<div class="container">

<div class="hero">
  <h1>V.a.a.S</h1>
  <p>
    Is your sustainability report supported by evidence?<br>
    <b>How audit firms scale verification</b>
  </p>
</div>

<div class="search">
  <textarea id="input" placeholder="Paste a claim..."></textarea>
  <button id="btn" onclick="run()">Audit this claim</button>
</div>

<!-- ✅ SAFE BUTTONS -->
<div class="examples">
  <button onclick="example(0)">Scope 2</button>
  <button onclick="example(1)">Emissions</button>
  <button onclick="example(2)">Waste</button>
</div>

<div style="text-align:center; margin-top:15px;">
  <button onclick="window.location.hrefrt audit →
  </button>
</div>

<!-- ✅ RESULT -->
<div id="result" class="result">

<div style="display:flex;align-items:center;gap:10px;">

<svg id="tree" class="tree green" viewBox="0 0 100 100">
<circle cx="50" cy="20" r="12"/>
<circle cx="35" cy="50" r="12"/>
<circle cx="65" cy="50" r="12"/>
<rect x="45" y="30" width="10" height="50"/>
</svg>

<h2 id="verdict"></h2>

</div>

<div class="metrics">
  <div class="card"><b>Units</b><br><span id="units"></span></div>
  <div class="card"><b>Contradiction</b><br><span id="contr"></span></div>
</div>

<div id="proof"></div>

<div style="margin-top:15px;">
<b>Improve validation</b>
<div id="improve"></div>
</div>

</div>

<div class="cta">
  <p><b>Scale audit by focusing only on unsupported claims</b></p>
  <button onclick="window.open('https://outlook.office.com/bookwithme/user/466894027f1f4dfc930519865f644c3a@tiiqunetwork.onmicrosoft.com/meetingtype/vBAwqD3-ZUed0szQcaApaA2')">
    Discuss a pilot
  </button>
</div>

</div>

<script>

// ✅ SAFE DATA
const data = [
"Market-based Scope 2 uses supplier contract emission factors where available.",
"Total market-based Scope 1+2 emissions in 2023 were 366.683.",
"Waste-management approach is based on the EU Waste Framework Directive hierarchy."
];

// ✅ BUTTON CLICK
function example(i){
  document.getElementById("input").value = data[i];
}

// ✅ MAIN LOGIC
function run(){

var text=document.getElementById("input").value.toLowerCase();
var btn=document.getElementById("btn");

btn.innerText="Auditing...";
btn.style.background="#777";

var verdict="No rule";
var units="1";
var contr="0";
var proof="";
var improve="";
var color="orange";

/* CLAIM 1 */
if(text.indexOf("scope 2")!=-1){
  verdict="Fully trusted";
  units="3";
  contr="0";
  color="green";
  proof="<div class='proof'><b>GHG Protocol Scope 2 Guidance</b><br><a href='https://ghgprotocol.org/sites/default/files/2023-03/Scope%202%20Guidance.pdfce</a><br>Chapter 6.11.3 (pp.56–57)</div>";
  improve="No internal evidence required";
}

/* CLAIM 2 */
else if(text.indexOf("366")!=-1){
  verdict="Contradicted by internal report";
  units="2";
  contr="100";
  color="red";
  proof="<div class='proof'><b>Internal report</b><br>ESRS E1-6 page 64<br>219.290 + 140.375 ≠ 366.683</div>";
  improve="Fix calculation inconsistency";
}

/* CLAIM 3 */
else if(text.indexOf("waste")!=-1){
  verdict="Directionally consistent – internal evidence required";
  units="1";
  contr="0";
  color="orange";
  proof="<div class='proof'><b>EU Directive 2008/98/EC</b><br><a href='https://eur-lex.europa.eu/legal-content/EN/TXT/?uri=CELEX:32008L0098'e</a><br>Article 4 – Waste hierarchy</div>";
  improve="Provide internal policy evidence";
}

// ✅ RENDER
document.getElementById("result").style.display="block";
document.getElementById("verdict").innerText=verdict;
document.getElementById("units").innerText=units;
document.getElementById("contr").innerText=contr+"/100";
document.getElementById("proof").innerHTML=proof;
document.getElementById("improve").innerText=improve;

var tree=document.getElementById("tree");
tree.classList.remove("green","orange","red");
tree.classList.add(color);

btn.innerText="Audit this claim";
btn.style.background="#034459";

}

</script>

</body>
</html>
