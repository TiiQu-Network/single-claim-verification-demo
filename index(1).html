<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>V.a.a.S – Audit Verification</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#f6f9fb;
}
.container{
  max-width:900px;
  margin:auto;
  padding:40px 20px;
}
.hero{text-align:center;}
.hero h1{font-size:60px;font-weight:900;}
.hero p{font-size:18px;color:#444;}

.search{
  display:flex;
  gap:10px;
  margin-top:30px;
  background:#fff;
  padding:15px;
  border-radius:15px;
}
textarea{
  flex:1;
  border:none;
  font-size:18px;
  outline:none;
}
button{
  padding:12px 20px;
  border:none;
  border-radius:10px;
  background:#034459;
  color:white;
  cursor:pointer;
}

.examples{
  text-align:center;
  margin-top:10px;
}
.examples button{
  background:white;
  color:#034459;
  border:1px solid #ccc;
  margin:5px;
}

.result{
  display:none;
  background:white;
  margin-top:30px;
  padding:20px;
  border-radius:15px;
}

.tree{width:70px;height:70px;}
.green{fill:#16a34a;}
.orange{fill:#f59e0b;}
.red{fill:#ef4444;}

.metrics{
  display:flex;
  gap:10px;
  margin-top:10px;
}
.card{
  background:#f8fafc;
  padding:10px;
  border-radius:8px;
  border:1px solid #ddd;
}

.proof{
  background:#111;
  color:white;
  padding:12px;
  border-radius:10px;
  margin-top:10px;
}
.proof a{color:#60a5fa;}

.cta{
  text-align:center;
  margin-top:40px;
}
.cta button{
  background:#f59e0b;
}
</style>
</head>

<body>

<div class="container">

<div class="hero">
<h1>V.a.a.S</h1>
<p>Is your sustainability report supported by evidence?</p>
</div>

<div class="search">
<textarea id="input" placeholder="Paste a claim..."></textarea>
<button onclick="run()">Audit this claim</button>
</div>

<div class="examples">
<button onclick="fill1()">Scope 2</button>
<button onclick="fill2()">Emissions</button>
<button onclick="fill3()">Waste</button>
</div>

<div id="result" class="result">

<div style="display:flex;align-items:center;gap:10px;">
<svg id="tree" class="tree green" viewBox="0 0 100 100">
<circle cx="50" cy="20" r="12"/>
<circle cx="35" cy="50" r="12"/>
<circle cx="65" cy="50" r="12"/>
<rect x="45" y="30" width="10" height="50"/>
</svg>
<h2 id="verdict"></h2>
</div>

<div class="metrics">
<div class="card">Units: <span id="units"></span></div>
<div class="card">Contradiction: <span id="contr"></span></div>
</div>

<div id="proof"></div>

<div style="margin-top:15px;">
Improve validation:
<div id="improve"></div>
</div>

</div>

<div class="cta">
<p><b>Scale audit by focusing only on unsupported claims</b></p>
<button onclick="window.open('https://outlook.office.com/bookwithme/user/466894027f1f4dfc930519865f644c3a@tiiqunetwork.onmicrosoft.com/meetingtype/vBAwqD3-ZUed0szQcaApaA2')">
Discuss a pilot
</button>
</div>

</div>

<script>

/* TEST: ensures JS runs */
console.log("JS loaded correctly");

/* Example fillers */
function fill1(){
 document.getElementById("input").value =
 "Market-based Scope 2 uses supplier contract emission factors";
}
function fill2(){
 document.getElementById("input").value =
 "Total market-based Scope 1+2 emissions in 2023 were 366.683";
}
function fill3(){
 document.getElementById("input").value =
 "Waste-management approach is based on the EU Waste Framework Directive hierarchy";
}

/* MAIN FUNCTION */
function run(){

console.log("RUN FUNCTION TRIGGERED"); // ✅ critical debug

var text = document.getElementById("input").value.toLowerCase();

var verdict = "No rule matched";
var units = "1";
var contr = "0";
var color = "orange";

var proof = "<div class='proof'>No structured evidence</div>";
var improve = "Define verification rule";

/* Scope 2 */
if (text.indexOf("scope") !== -1 && text.indexOf("2") !== -1) {

 verdict = "Fully trusted";
 units = "3";
 contr = "0";
 color = "green";

 proof =
 "<div class='proof'><b>GHG Protocol</b><br>" +
 "<a href='https://ghgprotocol.org/sites/default/files/2023-03/Scope%202%20Guidance.pdf'e</a><br>" +
 "Chapter 6.11.3 (pp.56–57)</div>";

 improve = "Optional: include internal methodology";
}

/* Emissions */
else if (text.indexOf("366") !== -1) {

 verdict = "Contradicted";
 units = "2";
 contr = "100";
 color = "red";

 proof =
 "<div class='proof'><b>Internal report</b><br>" +
 "Page 64 – mismatch in values</div>";

 improve = "Fix calculation inconsistency";
}

/* Waste */
else if (text.indexOf("waste") !== -1) {

 verdict = "Directionally consistent";
 units = "1";
 contr = "0";
 color = "orange";

 proof =
 "<div class='proof'><b>EU Directive</b><br>" +
 "<a href='https://eur-lex.europa.eu/legal-content/EN/TXT/?uri=CELEX:32008L0098' target='_blankArticle 4 – hierarchy</div>";

 improve = "Add internal policy proof";
}

/* RENDER */
document.getElementById("result").style.display = "block";
document.getElementById("verdict").innerText = verdict;
document.getElementById("units").innerText = units;
document.getElementById("contr").innerText = contr + "/100";
document.getElementById("proof").innerHTML = proof;
document.getElementById("improve").innerText = improve;

document.getElementById("tree").setAttribute("class", "tree " + color);

}
</script>

</body>
</html>
