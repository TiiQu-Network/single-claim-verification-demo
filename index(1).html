<!DOCTYPE html>
<html>
<head>
<title>V.a.a.S</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body { font-family: Arial; background:#f6f9fb; margin:0; }
.container { max-width:800px; margin:auto; padding:40px; text-align:center; }

textarea {
  width:100%;
  padding:10px;
  font-size:16px;
}

button {
  margin-top:10px;
  padding:10px 20px;
  background:#034459;
  color:white;
  border:none;
  cursor:pointer;
}

.examples button {
  background:#ddd;
  color:black;
  margin:5px;
}

.result {
  display:none;
  margin-top:20px;
  background:white;
  padding:15px;
}

.green{color:green;}
.orange{color:orange;}
.red{color:red;}
</style>
</head>

<body>

<div class="container">

<h1>V.a.a.S</h1>
<p>Is your sustainability report supported by evidence?</p>

<textarea id="input"></textarea>

<br>
<button onclick="run()">Audit this claim</button>

<div class="examples">
  <button onclick="fill('scope2')">Scope 2</button>
  <button onclick="fill('366')">Emissions</button>
  <button onclick="fill('waste')">Waste</button>
</div>

<br>
<button onclick="goDoc()">Test full report →</button>

<div id="result" class="result">
  <h2 id="verdict"></h2>
  <p>Units: <span id="units"></span></p>
  <p>Contradiction: <span id="contr"></span></p>
</div>

</div>

<script>

/* ✅ SIMPLE FILL */
function fill(type){
  if(type === "scope2") document.getElementById("input").value = "scope 2";
  if(type === "366") document.getElementById("input").value = "366";
  if(type === "waste") document.getElementById("input").value = "waste";
}

/* ✅ SIMPLE NAVIGATION */
function goDoc(){
  alert("Opening document-demo.html");
  window.location.href = "document-demo.html";
}

/* ✅ CORE FUNCTION */
function run(){

  var input = document.getElementById("input").value.toLowerCase();

  var verdict = "No rule";
  var units = "1";
  var contr = "0";

  if(input.indexOf("scope 2") !== -1){
    verdict = "Fully trusted";
    units = "3";
    contr = "0";
  }
  else if(input.indexOf("366") !== -1){
    verdict = "Contradicted";
    units = "2";
    contr = "100";
  }
  else if(input.indexOf("waste") !== -1){
    verdict = "Partial";
    units = "1";
    contr = "0";
  }

  document.getElementById("result").style.display = "block";
  document.getElementById("verdict").innerText = verdict;
  document.getElementById("units").innerText = units;
  document.getElementById("contr").innerText = contr;
}

</script>

</body>
</html>
