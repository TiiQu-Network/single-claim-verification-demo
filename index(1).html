<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>V.a.a.S – Audit Verification</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#f6f9fb;
}
.container{
  max-width:900px;
  margin:auto;
  padding:40px 20px;
}
.hero{text-align:center;}
.hero h1{font-size:60px;font-weight:900;}
.hero p{font-size:18px;color:#444;}

.search{
  display:flex;
  gap:10px;
  margin-top:30px;
  background:#fff;
  padding:15px;
  border-radius:15px;
}
textarea{
  flex:1;
  border:none;
  font-size:18px;
  outline:none;
}
button{
  padding:12px 20px;
  border:none;
  border-radius:10px;
  background:#034459;
  color:white;
  cursor:pointer;
}

/* Examples */
.examples{text-align:center;margin-top:10px;}
.examples button{
  background:white;
  color:#034459;
  border:1px solid #ccc;
  margin:5px;
}

/* Result */
.result{
  display:none;
  background:white;
  margin-top:30px;
  padding:20px;
  border-radius:15px;
}

/* Tree */
.tree{width:70px;height:70px;}
.green{fill:#16a34a;}
.orange{fill:#f59e0b;}
.red{fill:#ef4444;}

.metrics{
  display:flex;
  gap:10px;
  margin-top:10px;
}
.card{
