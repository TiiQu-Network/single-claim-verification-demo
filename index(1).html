<!DOCTYPE html>
<html>
<head>
  <title>VaaS Debug</title>
</head>

<body style="font-family:Arial; text-align:center; padding:40px;">

<h1>V.a.a.S</h1>

<textarea id="input" style="width:80%; height:60px;"></textarea>

<br><br>

<button onclick="run()">Audit this claim</button>

<br><br>

<button onclick="fill()">Fill example</button>

<div id="result" style="margin-top:30px; display:none;">
  <h2 id="verdict"></h2>
</div>

<script>

/* DEBUG: proves JS loaded */
alert("JS LOADED ✅");

/* Fill example */
function fill(){
  document.getElementById("input").value = "scope 2";
}

/* MAIN */
function run(){

  alert("BUTTON CLICKED ✅");

  var text = document.getElementById("input").value.toLowerCase();

  var verdict = "No match";

  if(text.indexOf("scope") !== -1){
    verdict = "Fully trusted";
  }

  document.getElementById("result").style.display = "block";
  document.getElementById("verdict").innerText = verdict;

  alert("RESULT DISPLAYED ✅");

}

</script>

</body>
</html>
