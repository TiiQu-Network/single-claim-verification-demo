<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>V.a.a.S – Audit Verification</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#f6f9fb;
}
.container{
  max-width:900px;
  margin:auto;
  padding:40px;
}

.hero{text-align:center;}
.hero h1{font-size:60px;font-weight:900;}
.hero p{color:#444;}

.search{
  display:flex;
  gap:10px;
  margin-top:30px;
  background:white;
  padding:15px;
}
textarea{
  flex:1;
  font-size:16px;
}
button{
  padding:10px 20px;
  background:#034459;
  color:white;
  border:none;
  cursor:pointer;
}

.result{
  display:none;
  margin-top:30px;
  background:white;
  padding:20px;
}

/* proof */
.proof{
  background:#111;
  color:white;
  padding:10px;
  margin-top:10px;
}
.proof a{color:#60a5fa;}

.card{
  display:inline-block;
  padding:10px;
  border:1px solid #ccc;
  margin:5px;
}
</style>
</head>

<body>

<div class="container">

<div class="hero">
<h1>V.a.a.S</h1>
<p>Is your sustainability report supported by evidence?</p>
</div>

<div class="search">
<textarea id="input"></textarea>
<button onclick="run()">Audit this claim</button>
</div>

<div>
<button onclick="fill('scope2')">Scope 2</button>
<button onclick="fill('366')">Emissions</button>
<button onclick="fill('waste')">Waste</button>
</div>

<div id="result" class="result">
<h2 id="verdict"></h2>

<div class="card">Units: <span id="units"></span></div>
<div class="card">Contradiction: <span id="contr"></span></div>

<div id="proof"></div>

<p><b>Improve validation:</b></p>
<div id="improve"></div>
</div>

</div>

<script>

/* Fill examples */
function fill(type){
 if(type==="scope2"){
  document.getElementById("input").value="scope 2 emissions";
 }
 if(type==="366"){
  document.getElementById("input").value="366.683";
 }
 if(type==="waste"){
  document.getElementById("input").value="waste hierarchy";
 }
}

/* MAIN FUNCTION */
function run(){

var text = document.getElementById("input").value.toLowerCase();

var verdict="No rule";
var units="1";
var contr="0";
var proof="No evidence";
var improve="Define rule";

/* ✅ Scope 2 */
if(text.indexOf("scope")>-1 && text.indexOf("2")>-1){

 verdict="Fully trusted";
 units="3";

 proof =
 "<div class='proof'>" +
 "<b>GHG Protocol Scope 2</b><br>" +
 "<a href='https://ghgprotocol.org/sites/default/files/2023-03/Scope%202%20Guidance.pdf' target 6.2 (pp.44–45)<br>" +
 "Chapter 6.11.3 (pp.56–57)" +
 "</div>";

 improve="Optional: provide internal methodology";
}

/* ✅ Emissions */
else if(text.indexOf("366")>-1){

 verdict="Contradicted";
 units="2";
 contr="100";

 proof =
 "<div class='proof'>" +
 "<b>Internal report</b><br>" +
 "Page 64<br>" +
 "219.290 + 140.375 ≠ 366.683" +
 "</div>";

 improve="Fix reported total";
}

/* ✅ Waste */
else if(text.indexOf("waste")>-1){

 verdict="Partial";
 units="1";

 proof =
 "<div class='proof'>" +
 "<b>EU Directive</b><br>" +
 "<a href='https://eur-lex.europa.eu/legal-content/EN/TXT/?uri=CELEX:32008L0098' target='_blankArticle 4 – Waste hierarchy" +
 "</div>";

 improve="Add internal waste policy";
}

/* ✅ render */
document.getElementById("result").style.display="block";
document.getElementById("verdict").innerText=verdict;
document.getElementById("units").innerText=units;
document.getElementById("contr").innerText=contr+"/100";
document.getElementById("proof").innerHTML=proof;
document.getElementById("improve").innerText=improve;

}

</script>

</body>
</html>
