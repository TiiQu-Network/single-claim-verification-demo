<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>V.a.a.S – Audit Verification</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
  margin:0;
  font-family:system-ui, Arial;
  background:#f6f9fb;
}

.container{
  max-width:1000px;
  margin:auto;
  padding:50px 20px;
}

/* HERO */
.hero{text-align:center;}
.hero h1{
  font-size:70px;
  font-weight:900;
}
.hero p{
  font-size:20px;
  color:#555;
}

/* SEARCH */
.search{
  display:flex;
  gap:10px;
  margin-top:40px;
  background:white;
  border-radius:20px;
  padding:15px;
}

textarea{
  flex:1;
  border:none;
  outline:none;
  font-size:18px;
}

button{
  padding:15px 20px;
  border:none;
  border-radius:12px;
  background:#034459;
  color:white;
  cursor:pointer;
  font-weight:700;
}

button:active{
  transform:scale(0.97);
}

/* RESULT */
.result{
  display:none;
  margin-top:30px;
  background:white;
  padding:20px;
  border-radius:15px;
}

/* TREE */
.tree{
  width:70px;
  height:70px;
}
.green{fill:#16a34a;}
.orange{fill:#f59e0b;}
.red{fill:#ef4444;}

.proof{
  background:#111;
  color:white;
  padding:10px;
  margin-top:10px;
  border-radius:10px;
}

a{color:#60a5fa;}
</style>
</head>

<body>

<div class="container">

<div class="hero">
  <h1>V.a.a.S</h1>
  <p>Is your report supported by evidence?<br>
  <b>Audit firms can scale verification here</b></p>
</div>

<div class="search">
  <textarea id="input" placeholder="Paste a claim..."></textarea>
  <button onclick="run()">Audit</button>
</div>
<!-- EXAMPLE CLAIMS -->
<div style="text-align:center; margin-top:20px;">
  <button onclick="document.getElementById('input').value='Market-based Scope 2 uses supplier contract emission factors where available.'">
    Scope 2 methodology
  </button>

  <button onclick="document.getElementById('input').value='Total market-based Scope 1+2 emissions in 2023 were 366.683.'">
    Scope 1+2 emissions
  </button>

  <button onclick="document.getElementById('input').value='Waste-management approach is based on the EU Waste Framework Directive hierarchy.'">
    Waste hierarchy
  </button>
</div>

<!-- FULL REPORT BUTTON -->
<div style="text-align:center; margin-top:20px;">
  <button 
    onclick="window.location.href='document-demo.html'" 
    style="background:#034459; color
<div id="result" class="result">

<svg id="tree" class="tree green" viewBox="0 0 100 100">
 <circle cx="50" cy="20" r="12"/>
 <circle cx="35" cy="50" r="12"/>
 <circle cx="65" cy="50" r="12"/>
 <rect x="45" y="30" width="10" height="50"/>
</svg>

<h2 id="verdict"></h2>

<p><b>Units:</b> <span id="units"></span></p>
<p><b>Contradiction:</b> <span id="contr"></span></p>

<div id="proofs"></div>

<p><b>Improve validation:</b></p>
<div id="improve"></div>

<br>
<button onclick="window.open('https://outlook.office.com/bookwithme/user/466894027f1f4dfc930519865f644c3a@tiiqunetwork.onmicrosoft.com/meetingtype/vBAwqD3-ZUed0szQcaApaA2')">
Discuss pilot
</button>

</div>

</div>

<script>

function run(){

// ✅ ALWAYS runs (no condition blocking)

const claim = document.getElementById("input").value.toLowerCase();

// default values
let verdict = "Externally aligned";
let color = "orange";
let units = 1;
let contradiction = 0;
let proof = `
<div class="proof">
External reference<br>
#View source</a>
</div>`;
let improve = "Add internal policy or report evidence";

// 🔥 logic
if(claim.includes("scope 2")){
  verdict="Fully trusted";
  color="green";
  units=3;
  contradiction=0;
  proof=`
  <div class="proof">
  GHG Protocol<br>
  <a href="https://ghgprotocol.org/sites/default/files/2023-03/Scope%202%20Guid  Open source
  </a><br>
  Supplier-specific emission factors may be used
  </div>`;
}

if(claim.includes("366")){
  verdict="Contradicted by report";
  color="red";
  units=2;
  contradiction=100;
  proof=`
  <div class="proof">
  Internal report (same document)<br>
  Scope1 + Scope2 ≠ reported total
  </div>`;
}

// ✅ render
document.getElementById("result").style.display="block";
document.getElementById("verdict").innerText=verdict;
document.getElementById("units").innerText=units;
document.getElementById("contr").innerText=contradiction+"/100";
document.getElementById("proofs").innerHTML=proof;
document.getElementById("improve").innerText=improve;

let tree=document.getElementById("tree");
tree.classList.remove("green","orange","red");
tree.classList.add(color);

}

</script>

</body>
</html>
